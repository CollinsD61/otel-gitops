# ──────────────────────────────────────────────────────────────────────────────
# manifests/namespaces/namespace.yaml
#
# Namespace definitions for the OpenTelemetry Demo and supporting services.
#
# Best practices applied:
#   - Labels for monitoring and policy enforcement.
#   - Pod Security Standards enforced via labels.
#   - Resource quotas are separate resources (see ResourceQuota TODO).
# ──────────────────────────────────────────────────────────────────────────────

# ── otel-demo namespace ────────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: otel-demo
  labels:
    # Standard Kubernetes recommended labels.
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: otel-gitops

    # Pod Security Standards — enforce baseline policy.
    # Docs: https://kubernetes.io/docs/concepts/security/pod-security-standards/
    # TODO: Change to "restricted" once all services support it.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted

    # Label used by NetworkPolicy selectors.
    kubernetes.io/metadata.name: otel-demo

    # Environment label — used by monitoring dashboards and alert routing.
    # TODO: Override this label in each environment's manifest if needed.
    environment: dev   # TODO: Parameterise per environment

  annotations:
    # Human-readable description for cluster administrators.
    description: "OpenTelemetry Demo microservices application"

    # TODO: Add cost-allocation labels for chargeback.
    # billing/team: "platform"
    # billing/project: "otel-demo"

---
