---
# ── ingress-nginx namespace ────────────────────────────────────────────────────
# Managed by the ingress-nginx bootstrap Application; defined here for
# reference and labelling purposes only.
apiVersion: v1
kind: Namespace
metadata:
  name: ingress-nginx
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: otel-gitops
    pod-security.kubernetes.io/enforce: baseline
  annotations:
    description: "NGINX Ingress Controller"

---
# ── cert-manager namespace ─────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: otel-gitops
    pod-security.kubernetes.io/enforce: baseline
  annotations:
    description: "cert-manager — automated TLS certificate management"
