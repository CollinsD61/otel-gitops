# ──────────────────────────────────────────────────────────────────────────────
# bootstrap/cert-manager/cert-manager-app.yaml
#
# ArgoCD Application for cert-manager.
# Chart: https://charts.jetstack.io
# Docs: https://cert-manager.io/docs/installation/helm/
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: otel-gitops
    tier: bootstrap
spec:
  project: default

  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    # TODO: Pin to a specific version. Always check breaking changes on upgrade.
    targetRevision: "v1.14.4"
    helm:
      releaseName: cert-manager
      values: |
        # Install cert-manager CRDs as part of the Helm release.
        # This is the recommended approach for GitOps deployments.
        crds:
          enabled: true

        # ─── Resources ────────────────────────────────────────────────────────
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 256Mi

        # ─── Prometheus metrics ───────────────────────────────────────────────
        prometheus:
          enabled: true             # TODO: Requires Prometheus Operator
          servicemonitor:
            enabled: false          # TODO: Enable when Prometheus is deployed

        # ─── Replica count ────────────────────────────────────────────────────
        replicaCount: 1             # TODO: Increase to 2+ for production HA

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # Required for large CRDs
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# ──────────────────────────────────────────────────────────────────────────────
# ClusterIssuer — Let's Encrypt Staging
#
# Use the staging issuer for testing to avoid rate limits.
# Switch to the production issuer once everything is working.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: otel-gitops
spec:
  acme:
    # Let's Encrypt STAGING endpoint (use this for testing).
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    # TODO: Replace with your email address for certificate expiry notifications.
    email: admin@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx

---
# ──────────────────────────────────────────────────────────────────────────────
# ClusterIssuer — Let's Encrypt Production
#
# Only use this after verifying the staging issuer works correctly.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: otel-gitops
spec:
  acme:
    # Let's Encrypt PRODUCTION endpoint.
    server: https://acme-v02.api.letsencrypt.org/directory
    # TODO: Replace with your email address.
    email: admin@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
