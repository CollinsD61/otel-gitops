# ──────────────────────────────────────────────────────────────────────────────
# bootstrap/metrics-server/metrics-server-app.yaml
#
# ArgoCD Application for the Kubernetes Metrics Server.
# Chart: https://kubernetes-sigs.github.io/metrics-server/
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: otel-gitops
    tier: bootstrap
spec:
  project: default

  source:
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    chart: metrics-server
    # TODO: Pin to a specific version for reproducibility.
    targetRevision: "3.12.1"
    helm:
      releaseName: metrics-server
      values: |
        # ─── Kind-specific: disable TLS verification ──────────────────────────
        # Remove --kubelet-insecure-tls for production clusters with proper TLS.
        args:
          - --kubelet-insecure-tls    # TODO: Remove for production
          - --kubelet-preferred-address-types=InternalIP

        # ─── Resources ────────────────────────────────────────────────────────
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi

        # ─── Metrics (Prometheus) ─────────────────────────────────────────────
        metrics:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 2m
