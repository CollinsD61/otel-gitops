# ──────────────────────────────────────────────────────────────────────────────
# bootstrap/ingress-nginx/ingress-nginx-values.yaml
#
# Helm values for the NGINX Ingress Controller.
# Chart: https://kubernetes.github.io/ingress-nginx
#
# TODO: Adjust service type and annotations for your cloud provider.
# ──────────────────────────────────────────────────────────────────────────────

controller:
  # ─── Replica count ─────────────────────────────────────────────────────────
  # TODO: Increase to 2+ for production HA.
  replicaCount: 1

  # ─── Service type ──────────────────────────────────────────────────────────
  service:
    # Use NodePort for Kind clusters; LoadBalancer for cloud.
    type: NodePort   # TODO: Change to LoadBalancer for cloud environments

    # TODO: Uncomment and set static IPs for cloud environments.
    # loadBalancerIP: ""
    # annotations:
    #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"

  # ─── IngressClass ──────────────────────────────────────────────────────────
  ingressClassResource:
    name: nginx
    enabled: true
    default: true   # Make nginx the default IngressClass

  # ─── Metrics (for Prometheus scraping) ─────────────────────────────────────
  metrics:
    enabled: true   # TODO: Requires Prometheus to be deployed
    serviceMonitor:
      enabled: false  # TODO: Set to true once Prometheus Operator is installed

  # ─── Resource requests and limits ──────────────────────────────────────────
  resources:
    requests:
      cpu: 100m
      memory: 90Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # ─── Kind-specific: use hostPort for local port-forwarding ─────────────────
  # TODO: Remove this section for cloud deployments.
  hostPort:
    enabled: false
    ports:
      http: 80
      https: 443

  # ─── Config ────────────────────────────────────────────────────────────────
  config:
    # Enable real IP from upstream load balancer headers.
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    # TODO: Tune for production traffic
    # proxy-body-size: "10m"
    # proxy-read-timeout: "60"

  # ─── Autoscaling ───────────────────────────────────────────────────────────
  autoscaling:
    enabled: false   # TODO: Enable for production
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
