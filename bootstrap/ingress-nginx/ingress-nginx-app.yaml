# ──────────────────────────────────────────────────────────────────────────────
# bootstrap/ingress-nginx/ingress-nginx-app.yaml
#
# ArgoCD Application for the NGINX Ingress Controller.
# Chart: https://kubernetes.github.io/ingress-nginx
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: otel-gitops
    tier: bootstrap
spec:
  project: default

  sources:
    - repoURL: https://kubernetes.github.io/ingress-nginx
      chart: ingress-nginx
      # TODO: Pin to a specific version for reproducibility.
      targetRevision: "4.10.1"
      helm:
        releaseName: ingress-nginx
        valueFiles:
          - $values/bootstrap/ingress-nginx/ingress-nginx-values.yaml
    - repoURL: https://github.com/CollinsD61/otel-gitops
      targetRevision: HEAD
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
